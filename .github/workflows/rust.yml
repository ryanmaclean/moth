name: rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config perl make
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked --frozen --offline -- -D warnings

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config perl make
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked --frozen --offline

  cross-check-aarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install apt deps
        # gcc-aarch64-linux-gnu ships the cross *compiler* but NOT the
        # aarch64 sysroot. Without libc6-dev-arm64-cross (glibc headers)
        # and linux-libc-dev-arm64-cross (kernel headers), C build
        # scripts in libz-sys / openssl-sys / curl-sys fail with
        # 'zlib.h: No such file or directory' the moment they try to
        # build the vendored zlib/openssl/libcurl for the target.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config perl make \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            linux-libc-dev-arm64-cross
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-cross
      - name: Diagnostics (fail-tolerant)
        run: |
          set +e
          echo "::group::os"
          cat /etc/os-release
          echo "::endgroup::"
          echo "::group::rust"
          rustc -V
          cargo -V
          rustup show
          echo "::endgroup::"
          echo "::group::cross toolchain"
          which aarch64-linux-gnu-gcc
          aarch64-linux-gnu-gcc --version | head -1
          which aarch64-linux-gnu-ar
          echo "::endgroup::"
          echo "::group::cargo config"
          cat .cargo/config.toml || echo "(no .cargo/config.toml at $(pwd))"
          echo "::endgroup::"
      - name: cargo check (aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        # Capture both streams, then surface the tail as ::error::
        # annotations so the failure reason is visible on the PR
        # checks page without needing log auth.
        run: |
          set +e
          cargo check -v --workspace --target aarch64-unknown-linux-gnu \
            --locked --frozen --offline 2>&1 | tee /tmp/check.log
          RC=${PIPESTATUS[0]}
          echo "::notice::cargo check exit=$RC ($(wc -l </tmp/check.log) log lines)"
          if [ "$RC" -ne 0 ]; then
            echo "::group::tail of cargo check log"
            tail -120 /tmp/check.log
            echo "::endgroup::"
            echo "::error::cargo check failed (exit $RC); see tail above"
            tail -20 /tmp/check.log | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g' | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done
          fi
          exit "$RC"
      - name: Upload cargo check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-cargo-check-log
          path: /tmp/check.log
          if-no-files-found: warn
          retention-days: 7

  docker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agent:ci
